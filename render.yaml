services:
  # Static Site Service
  - type: web
    name: ultimatelinks
    env: static
    buildCommand: "echo 'No build required for static site'"
    startCommand: "echo 'Static site deployment'"
    staticPublishPath: .
    envVars:
      - key: NODE_VERSION
        value: "18"
    domains:
      - ultimatelinks.onrender.com
    healthCheckPath: /
    autoDeploy: true
    plan: free
