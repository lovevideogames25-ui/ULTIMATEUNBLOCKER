<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATEUNBLOCKER - Redirect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #2d2d2d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(245, 87, 108, 0.1) 0%, transparent 50%);
            animation: backgroundFloat 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes backgroundFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-20px, -20px) rotate(1deg); }
            66% { transform: translate(20px, -10px) rotate(-1deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(30px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            opacity: 0.05;
            z-index: -1;
            border-radius: 20px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .message {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .original-url {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .redirect-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 20px;
        }

        .redirect-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                transparent);
            transition: left 0.5s ease;
        }

        .redirect-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .redirect-button:hover::before {
            left: 100%;
        }

        .redirect-button:active {
            transform: translateY(-1px);
        }

        .loading {
            display: none;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading.active {
            display: block;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(10px) translateX(-10px); }
            75% { transform: translateY(-10px) translateX(20px); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="icon">🚀</div>
        <h1>ULTIMATELINKS has been moved!</h1>
        <div class="message">
            Welcome to <strong>ULTIMATEUNBLOCKER</strong> - The next generation of unblocking technology!<br>
            We've upgraded our platform to provide you with better features and enhanced performance.
        </div>
        
        <div class="original-url" id="originalUrl">
            Detecting your previous URL...
        </div>
        
        <button class="redirect-button" id="redirectBtn" onclick="handleRedirect()">
            Redirect to ULTIMATEUNBLOCKER
        </button>
        
        <div class="loading" id="loading">
            Redirecting you to the new platform...
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Get the referring URL or current URL
        function getOriginalUrl() {
            // Try to get the referring URL
            let originalUrl = document.referrer;
            
            // If no referrer, try to get from URL parameters
            if (!originalUrl) {
                const urlParams = new URLSearchParams(window.location.search);
                originalUrl = urlParams.get('from');
            }
            
            // If still no URL, use current location
            if (!originalUrl) {
                originalUrl = window.location.href;
            }
            
            return originalUrl;
        }

        // Determine the redirect URL based on the original URL
        function getRedirectUrl(originalUrl) {
            try {
                const url = new URL(originalUrl);
                const hostname = url.hostname.toLowerCase();
                
                if (hostname.includes('ultimatelinks.pages.dev')) {
                    return 'https://ultimateunblocker.pages.dev';
                } else if (hostname.includes('ultimatelinks.surge.sh')) {
                    return 'https://ultimateunblocker.surge.sh';
                } else {
                    // Random choice between the two options
                    const options = [
                        'https://ultimateunblocker.pages.dev',
                        'https://ultimateunblocker.surge.sh'
                    ];
                    return options[Math.floor(Math.random() * options.length)];
                }
            } catch (error) {
                // If URL parsing fails, return random option
                const options = [
                    'https://ultimateunblocker.pages.dev',
                    'https://ultimateunblocker.surge.sh'
                ];
                return options[Math.floor(Math.random() * options.length)];
            }
        }

        // Handle the redirect
        function handleRedirect() {
            const originalUrl = getOriginalUrl();
            const redirectUrl = getRedirectUrl(originalUrl);
            
            // Show loading state
            document.getElementById('loading').classList.add('active');
            document.getElementById('redirectBtn').disabled = true;
            document.getElementById('redirectBtn').textContent = 'Redirecting...';
            
            // Create particle burst effect
            createParticleBurst();
            
            // Redirect after a short delay
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1500);
        }

        // Create particle burst effect
        function createParticleBurst() {
            const button = document.getElementById('redirectBtn');
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: fixed;
                    width: 8px;
                    height: 8px;
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 9999;
                    left: ${centerX}px;
                    top: ${centerY}px;
                    transform: translate(-50%, -50%);
                `;
                
                document.body.appendChild(particle);
                
                const angle = (Math.PI * 2 * i) / 20;
                const distance = 100 + Math.random() * 100;
                const duration = 1000 + Math.random() * 500;
                
                particle.animate([
                    {
                        transform: 'translate(-50%, -50%) scale(1)',
                        opacity: 1
                    },
                    {
                        transform: `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px)) scale(0)`,
                        opacity: 0
                    }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                });
                
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, duration);
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            
            const originalUrl = getOriginalUrl();
            const originalUrlElement = document.getElementById('originalUrl');
            
            if (originalUrl && originalUrl !== window.location.href) {
                originalUrlElement.textContent = `From: ${originalUrl}`;
            } else {
                originalUrlElement.textContent = 'Welcome to the new platform!';
            }
            
            // Auto-redirect after 10 seconds if user doesn't click
            setTimeout(() => {
                const button = document.getElementById('redirectBtn');
                if (!button.disabled) {
                    handleRedirect();
                }
            }, 10000);
        });
    </script>
</body>
</html>
