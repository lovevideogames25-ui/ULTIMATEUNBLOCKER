# fly.toml app configuration file
# see https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "neutral-nexus-backend"
primary_region = "iad"

[build]
  builder = "heroku/builder:22"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  command = "npm run dev"

[[http_service.checks]]
  interval = "15s"
  timeout = "10s"
  grace_period = "5s"
  method = "GET"
  path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
