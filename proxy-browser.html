<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .browser-controls {
            background: #16213e;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }

        .nav-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .nav-btn:hover {
            background: #ff6b6b;
        }

        .nav-btn:disabled {
            background: #535c68;
            cursor: not-allowed;
        }

        .url-bar {
            flex: 1;
            background: #0f3460;
            border: 1px solid #533483;
            padding: 8px 12px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
        }

        .url-bar:focus {
            outline: none;
            border-color: #e94560;
        }

        .go-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .go-btn:hover {
            background: #ff6b6b;
        }

        .iframe-container {
            flex: 1;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e94560;
            font-size: 18px;
            display: none;
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e94560;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="browser-controls">
        <button class="nav-btn" id="backBtn" onclick="goBack()">← Back</button>
        <button class="nav-btn" id="forwardBtn" onclick="goForward()">Forward →</button>
        <button class="nav-btn" onclick="goHome()">🏠 Home</button>
        <input type="text" class="url-bar" id="urlInput" placeholder="Enter URL (e.g., https://search.brave.com)" onkeypress="handleKeyPress(event)">
        <button class="go-btn" onclick="navigate()">Go</button>
    </div>

    <div class="iframe-container">
        <iframe id="proxyFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
    </div>

    <div class="loading" id="loading">Loading...</div>
    <div class="error-message" id="error"></div>

    <script>
        const history = [];
        let currentIndex = -1;
        const iframe = document.getElementById('proxyFrame');
        const urlInput = document.getElementById('urlInput');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');

        // Detect proxy endpoint
        const isNetlify = window.location.hostname.includes('netlify.app');
        const isVercel = window.location.hostname.includes('vercel.app');
        const isLocalhost = window.location.hostname === 'localhost';

        let proxyEndpoint;
        if (isNetlify) {
            proxyEndpoint = '/proxy';
        } else if (isVercel) {
            proxyEndpoint = '/api/proxy';
        } else {
            proxyEndpoint = '/proxy';
        }

        function getProxyUrl(url) {
            return `${window.location.origin}${proxyEndpoint}?url=${encodeURIComponent(url)}`;
        }

        function navigate(url) {
            const targetUrl = url || urlInput.value.trim();
            
            if (!targetUrl) {
                showError('Please enter a URL');
                return;
            }

            // Ensure URL has protocol
            let finalUrl = targetUrl;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }

            loading.style.display = 'block';
            error.style.display = 'none';

            // Add to history
            if (currentIndex < history.length - 1) {
                history = history.slice(0, currentIndex + 1);
            }
            history.push(finalUrl);
            currentIndex = history.length - 1;

            updateNavButtons();

            // Load through proxy
            iframe.src = getProxyUrl(finalUrl);

            urlInput.value = finalUrl;

            iframe.onload = () => {
                loading.style.display = 'none';
            };

            iframe.onerror = () => {
                loading.style.display = 'none';
                showError('Failed to load page');
            };
        }

        function goBack() {
            if (currentIndex > 0) {
                currentIndex--;
                navigate(history[currentIndex]);
            }
        }

        function goForward() {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                navigate(history[currentIndex]);
            }
        }

        function goHome() {
            navigate('https://search.brave.com');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                navigate();
            }
        }

        function updateNavButtons() {
            backBtn.disabled = currentIndex <= 0;
            forwardBtn.disabled = currentIndex >= history.length - 1;
        }

        function showError(message) {
            error.textContent = message;
            error.style.display = 'block';
            setTimeout(() => {
                error.style.display = 'none';
            }, 3000);
        }

        // Initialize with a default URL
        window.onload = () => {
            urlInput.value = 'https://search.brave.com';
        };
    </script>
</body>
</html>
