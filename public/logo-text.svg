<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo part -->
  <g transform="translate(10, 15)">
    <circle cx="15" cy="15" r="12" fill="#1a1a2e" stroke="url(#textGradient)" stroke-width="1"/>
    <path d="M15 6 L23 10 L23 18 C23 23 19 27 15 29 C11 27 7 23 7 18 L7 10 Z" 
          fill="url(#textGradient)" 
          opacity="0.9"/>
    <rect x="12" y="14" width="6" height="5" rx="1" fill="#1a1a2e"/>
    <path d="M13 14 L13 12 C13 10 14 9 15 9 C16 9 17 10 17 12 L17 14" 
          stroke="#1a1a2e" 
          stroke-width="1" 
          fill="none"/>
  </g>
  
  <!-- Text part -->
  <text x="40" y="25" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" 
        fill="url(#textGradient)" filter="url(#textGlow)">ULTIMATE</text>
  <text x="40" y="42" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" 
        fill="url(#textGradient)" filter="url(#textGlow)">UNBLOCKER</text>
</svg>
