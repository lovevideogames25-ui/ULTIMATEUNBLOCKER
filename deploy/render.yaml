# Render Static Site Configuration
services:
  - type: static
    name: ultimatelinks
    buildCommand: "echo 'No build required for static site'"
    staticPublishPath: .
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: NODE_ENV
        value: "production"
    domains:
      - ultimatelinks.onrender.com
    autoDeploy: true
    plan: free
    headers:
      - path: "/*"
        name: "X-Frame-Options"
        value: "DENY"
      - path: "/*"
        name: "X-XSS-Protection"
        value: "1; mode=block"
      - path: "/*"
        name: "X-Content-Type-Options"
        value: "nosniff"
      - path: "/*"
        name: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
      - path: "/*"
        name: "Permissions-Policy"
        value: "geolocation=(), microphone=(), camera=()"
    redirects:
      - source: "/home"
        destination: "/"
        permanent: true
      - source: "/categories"
        destination: "/#categories"
        permanent: true
      - source: "/settings"
        destination: "/#settings"
        permanent: true
      - source: "/*"
        destination: "/index.html"
        type: rewrite
